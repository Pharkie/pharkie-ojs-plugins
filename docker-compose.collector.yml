# Better Stack Collector (host metrics + logs).
# Deployed separately from the main app stack.
#
# Usage (from /opt/pharkie-ojs-plugins on live):
#   docker compose -f docker-compose.collector.yml up -d
#
# Requires COLLECTOR_SECRET in .env file.
#
# eBPF agent removed — kernel-level tracing of all containers was consuming
# too much Better Stack quota for a single-server setup. The collector alone
# provides host metrics (CPU, memory, disk, network) and log forwarding.

name: better-stack

services:
  collector:
    image: ghcr.io/betterstackhq/collector:latest
    container_name: better-stack-collector
    hostname: sea-live
    restart: always
    network_mode: host
    environment:
      INSTALLED_AS: docker
      HOSTNAME: sea-live
      BASE_URL: https://telemetry.betterstack.com
      COLLECTOR_SECRET: ${COLLECTOR_SECRET}
      VECTOR_LOG_FORMAT: json
      CLUSTER_COLLECTOR: "false"
    volumes:
      - /var/lib/better-stack:/var/lib/better-stack
      - /:/host:ro
