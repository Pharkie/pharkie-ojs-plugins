; Suppress PHP deprecation notices in HTTP responses.
; OJS 3.5 on PHP 8.3 triggers deprecation warnings in core code
; (hash_hmac null key, htmlspecialchars null string) that pollute
; API JSON responses and break downstream parsers.
display_errors = Off
log_errors = On

; OJS NativeImportExportPlugin calls tempnam('', ...) without a directory,
; which triggers PHP notices about falling back to the system temp dir.
; Setting sys_temp_dir explicitly avoids the warning.
sys_temp_dir = /tmp
