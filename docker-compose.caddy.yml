# Caddy overlay — adds reverse proxy with automatic SSL.
# Requires CADDY_WP_DOMAIN and CADDY_OJS_DOMAIN in .env.
# Removes direct port exposure from staging.yml (Caddy handles 80/443).
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml -f docker-compose.caddy.yml up -d

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # --watch: auto-reload when any project drops/edits its snippet in conf.d.
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile --watch
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_WP_DOMAIN: ${CADDY_WP_DOMAIN:-:8080}
      CADDY_WP_AUTH_USER: ${CADDY_WP_AUTH_USER:-staging}
      CADDY_WP_AUTH_HASH: ${CADDY_WP_AUTH_HASH:-}
      CADDY_OJS_DOMAIN: ${CADDY_OJS_DOMAIN:?Set CADDY_OJS_DOMAIN in .env}
      # Optional — only set when the umami overlay is in use. Falls back to an
      # inert localhost address so the shared Caddyfile is valid without it.
      CADDY_UMAMI_DOMAIN: ${CADDY_UMAMI_DOMAIN:-http://localhost:8083}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Shared per-project vhost snippets. Any project on the box drops its own
      # <project>.caddy here; nobody edits a shared file. See docs/shared-caddy.md.
      - /opt/caddy-conf.d:/etc/caddy/conf.d:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - wp
      - ojs
    networks:
      - sea-net

volumes:
  caddy_data:
  caddy_config:
